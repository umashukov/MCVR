name: Build MCVR

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout MCVR
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        run: |
          # Скачиваем и устанавливаем официальный SDK через прямой вызов
          # Это установит все нужные утилиты (включая glslangValidator) в C:\VulkanSDK
          $installer = "VulkanSDK-Installer.exe"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/1.3.296.0/windows/VulkanSDK-1.3.296.0-Installer.exe" -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "/S" -Wait
          
          # Явно добавляем путь к папке Bin в PATH для текущего процесса
          echo "C:\VulkanSDK\1.3.296.0\Bin" >> $env:GITHUB_PATH
          echo "VULKAN_SDK=C:\VulkanSDK\1.3.296.0" >> $env:GITHUB_ENV

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Configure CMake
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
          -DJAVA_PROJECT_ROOT_DIR="$env:GITHUB_WORKSPACE" `
          -DMCVR_ENABLE_NRD=ON -DUSE_AMD=ON

      - name: Build Release
        run: cmake --build build -j --config Release

      - name: Install (Prepare Artifacts)
        run: cmake --install build --config Release --prefix ./dist

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: MCVR-Build-Windows
          path: ./dist
